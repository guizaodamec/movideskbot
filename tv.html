<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Suporte — FarmaFácil</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#080c18;color:#e2e8f6;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
      height:100vh;overflow:hidden;display:flex;flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
    }

    /* ── Header ── */
    #hd{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;height:60px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;
    }
    #hd-left{display:flex;align-items:center;gap:10px}
    #live-dot{width:9px;height:9px;border-radius:50%;background:#10b981;animation:dot-pulse 2s ease-in-out infinite;flex-shrink:0}
    @keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #hd-title{font-weight:700;font-size:22px}
    #hd-badge{
      font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;
      letter-spacing:.1em;text-transform:uppercase;
      color:#6b7a94;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    }
    #hd-info{font-size:12px;color:#6b7a94;text-align:center}
    #hd-right{text-align:right}
    #clock{font-family:monospace;font-weight:700;font-size:32px;line-height:1;letter-spacing:.06em}
    #datstr{font-size:12px;color:#6b7a94;margin-top:3px;text-transform:capitalize}

    /* ── Tab bar ── */
    #tb{
      display:flex;align-items:center;padding:0 32px;gap:10px;
      height:44px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;
    }
    .tab-btn{
      padding:5px 16px;border-radius:8px;border:1px solid transparent;
      background:none;color:#4b5a72;font-size:13px;font-weight:700;cursor:pointer;
      letter-spacing:.06em;text-transform:uppercase;
    }
    .tab-btn.on{background:rgba(59,130,246,0.13);border-color:rgba(59,130,246,0.28);color:#60a5fa}
    #prog-track{flex:1;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
    #prog-fill{height:100%;background:rgba(99,102,241,.5);border-radius:2px;transition:width .4s linear;width:0}
    #timer-lbl{font-family:monospace;font-size:12px;color:#4b5a72;min-width:26px;text-align:right}
    .ctrl-btn{
      padding:4px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.04);color:#4b5a72;font-size:11px;font-weight:700;
      cursor:pointer;letter-spacing:.04em;
    }
    #pause-btn.on{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.28);color:#f59e0b}

    /* ── Content ── */
    #content{flex:1;overflow:hidden;padding:14px 32px}
    .panel{display:none;height:100%;flex-direction:column;gap:10px}
    .panel.on{display:flex}

    /* ═══════════════════════════════════════
       METAS INDIVIDUAIS
    ═══════════════════════════════════════ */
    .totals{display:flex;gap:10px;flex-shrink:0}
    .tot-card{
      flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
      border-radius:12px;padding:10px 22px;display:flex;justify-content:space-between;align-items:center;
    }
    .tot-lbl{color:#6b7a94;font-size:13px;font-weight:600}
    .tot-val{font-family:monospace;font-size:34px;font-weight:700;line-height:1}

    #cd{
      display:flex;flex-shrink:0;align-items:center;gap:10px;
      padding:6px 16px;border-radius:10px;
      background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);
      transition:background .5s,border-color .5s;
    }
    .cd-lbl{color:#6b7a94;font-size:11px;font-weight:600}
    #cd-val{font-family:monospace;font-weight:700;font-size:13px;color:#6b7a94;transition:color .5s}
    #cd-warn{font-size:11px;font-weight:700;color:#f59e0b;display:none;margin-left:4px}

    #ranking{flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}

    .a-row{
      display:flex;flex-direction:column;gap:10px;
      padding:16px 22px 12px;border-radius:14px;
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .a-row.is-leader{
      background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.02));
      border-color:rgba(245,158,11,.42);
    }
    .a-row-body{display:flex;align-items:center;gap:28px}
    .rk-circle,.rk-plain{margin-right:16px}

    .rk-circle{
      width:52px;height:52px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:22px;font-family:monospace;
    }
    .rk-plain{
      width:52px;text-align:center;flex-shrink:0;
      font-family:monospace;font-size:20px;color:#4b5a72;font-weight:700;
    }

    .a-name-col{flex:1;min-width:0}
    .aname{
      font-size:32px;font-weight:700;color:white;line-height:1.1;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .ttag{
      display:inline-block;margin-top:5px;
      font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.04em;
    }

    .a-stats{display:flex;align-items:stretch;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.07)}
    .st{text-align:center;padding:0 28px;border-right:1px solid rgba(255,255,255,0.07)}
    .st .sl{font-size:11px;color:#6b7a94;font-weight:700;text-transform:uppercase;letter-spacing:.1em;line-height:1}
    .st .sv{font-family:monospace;font-weight:700;font-size:46px;line-height:1.15;margin-top:4px;color:white}

    .bar-wrap{height:2px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;opacity:.5}
    .bar-inner{height:100%;border-radius:3px;position:relative;overflow:hidden}
    .bar-shim{
      position:absolute;top:0;bottom:0;left:-60%;width:60%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
      animation:shim-move 2.5s infinite linear;
    }
    @keyframes shim-move{from{left:-60%}to{left:120%}}

    /* ═══════════════════════════════════════
       DESEMPENHO POR EQUIPE
    ═══════════════════════════════════════ */
    #eq-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;height:100%}
    .eq-card{
      border-radius:16px;background:rgba(255,255,255,0.025);
      border:1px solid rgba(255,255,255,0.06);border-left-width:4px;
      padding:20px 28px 16px;display:flex;flex-direction:column;gap:0;overflow:hidden;position:relative;
    }
    .eq-card.is-leader{background:rgba(255,255,255,0.04)}
    .eq-top-line{position:absolute;top:0;left:0;right:0;height:1px;opacity:.5}
    .eq-hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;margin-bottom:12px}
    .eq-name{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em}
    .eq-sub{font-size:11px;color:#6b7a94;margin-top:4px;font-weight:600}
    .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;letter-spacing:.04em;margin-top:4px}
    .b-sup{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981}
    .b-def{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
    .b-neu{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#f59e0b}
    .eq-metrics{
      display:flex;flex:1;align-items:center;
      border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);
      margin:0 -6px;
    }
    .eq-metric{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;border-right:1px solid rgba(255,255,255,0.05)}
    .eq-metric:last-child{border-right:none}
    .eq-metric .mv{font-family:monospace;font-weight:700;font-size:66px;line-height:1;letter-spacing:-.02em}
    .eq-metric .ml{font-size:11px;color:#6b7a94;text-transform:uppercase;letter-spacing:.12em;margin-top:8px;font-weight:700}
    .eq-foot{display:flex;align-items:center;gap:10px;margin-top:12px;flex-shrink:0}
    .eq-bar-track{flex:1;height:2px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;opacity:.5}
    .eq-bar-inner{height:100%;border-radius:3px;position:relative;overflow:hidden}
    .eq-bar-shim{
      position:absolute;top:0;bottom:0;left:-60%;width:60%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
      animation:shim-move 2.5s infinite linear;
    }
    .eq-taxa-lbl{font-size:10px;color:#6b7a94;font-weight:700;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
    .eq-taxa-val{font-family:monospace;font-size:13px;font-weight:700;flex-shrink:0}

    /* ═══════════════════════════════════════
       RITMO DIARIO
    ═══════════════════════════════════════ */
    #diario-list{
      flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden;min-height:0;
    }
    .di-row{
      display:flex;align-items:center;
      padding:0 18px;border-radius:12px;
      background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);
      flex:1;min-height:0;
    }
    .di-rk{
      width:38px;text-align:center;font-family:monospace;
      font-size:15px;color:#4b5a72;font-weight:700;flex-shrink:0;
    }
    .di-name-col{width:148px;flex-shrink:0;padding-right:14px}
    .di-name{
      font-size:21px;font-weight:700;color:white;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15;
    }
    .di-tag{
      display:inline-block;margin-top:3px;
      font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;letter-spacing:.04em;
    }
    .di-bar-col{flex:1;position:relative;margin:0 14px}
    .di-track{
      height:20px;background:rgba(255,255,255,0.04);
      border-radius:6px;overflow:hidden;position:relative;
    }
    .di-fill{
      height:100%;border-radius:6px;
      position:relative;overflow:hidden;
      transition:width .7s ease;
    }
    .di-fill-shim{
      position:absolute;top:0;bottom:0;left:-60%;width:60%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
      animation:shim-move 2.8s infinite linear;
    }
    .di-marker{
      position:absolute;top:0;bottom:0;width:2px;
      background:rgba(255,255,255,0.28);pointer-events:none;z-index:2;
    }
    .di-num-col{
      width:100px;text-align:right;flex-shrink:0;
      display:flex;align-items:baseline;justify-content:flex-end;gap:3px;
    }
    .di-num-big{font-family:monospace;font-weight:700;font-size:34px;line-height:1}
    .di-num-meta{font-size:13px;color:#4b5a72;font-family:monospace;font-weight:600}
  </style>
</head>
<body>

<div id="hd">
  <div id="hd-left">
    <div id="live-dot"></div>
    <span id="hd-title">FarmaFácil Suporte</span>
    <span id="hd-badge">TV ao vivo</span>
  </div>
  <div id="hd-info">Conectando...</div>
  <div id="hd-right">
    <div id="clock">00:00:00</div>
    <div id="datstr"></div>
  </div>
</div>

<div id="tb">
  <button class="tab-btn on" id="btn-metas"      onclick="goTab('metas')">Metas Individuais</button>
  <button class="tab-btn"    id="btn-diario"     onclick="goTab('diario')">Ritmo Diário</button>
  <button class="tab-btn"    id="btn-desempenho" onclick="goTab('desempenho')">Desempenho por Equipe</button>
  <div id="prog-track"><div id="prog-fill"></div></div>
  <span id="timer-lbl">30s</span>
  <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pausar</button>
  <button class="ctrl-btn" style="margin-left:4px" onclick="loadAll()">Atualizar</button>
</div>

<div id="content">

  <!-- METAS -->
  <div class="panel on" id="panel-metas">
    <div class="totals">
      <div class="tot-card"><span class="tot-lbl">Entrados</span><span class="tot-val" id="v-entr" style="color:#94a3b8">0</span></div>
      <div class="tot-card"><span class="tot-lbl">Fechados</span><span class="tot-val" id="v-fech" style="color:#e2e8f6">0</span></div>
      <div class="tot-card"><span class="tot-lbl">Saldo</span>   <span class="tot-val" id="v-saldo" style="color:#f59e0b">0</span></div>
    </div>
    <div id="cd">
      <span class="cd-lbl">Reset em:</span>
      <span id="cd-val">—</span>
      <span id="cd-warn">Menos de 1h</span>
    </div>
    <div id="ranking"></div>
  </div>

  <!-- RITMO DIARIO -->
  <div class="panel" id="panel-diario">
    <div class="totals">
      <div class="tot-card"><span class="tot-lbl">Fechados Hoje</span><span class="tot-val" id="di-total" style="color:#e2e8f6">—</span></div>
      <div class="tot-card"><span class="tot-lbl">Meta do Dia</span>  <span class="tot-val" id="di-meta"  style="color:#6b7a94">—</span></div>
      <div class="tot-card"><span class="tot-lbl">Saldo Dia</span>    <span class="tot-val" id="di-saldo" style="color:#e2e8f6">—</span></div>
    </div>
    <div id="diario-list"></div>
  </div>

  <!-- DESEMPENHO -->
  <div class="panel" id="panel-desempenho">
    <div id="eq-grid"></div>
  </div>

</div>

<script>
var TV_KEY    = 'tv-suporte-2026';
var API       = '/api';
var token     = null;
var data      = null;
var dataDiario= null;
var curTab    = 'metas';
var paused    = false;
var rotTmr    = null;
var ROT       = 30;
var TABS      = ['metas', 'diario', 'desempenho'];

var TC = {
  Fiscal:   { a:'#6E4EA1', bg:'rgba(110,78,161,.10)',  bd:'rgba(110,78,161,.30)' },
  Producao: { a:'#008B8B', bg:'rgba(0,139,139,.10)',   bd:'rgba(0,139,139,.30)'  },
  G1:       { a:'#2F6F91', bg:'rgba(47,111,145,.10)',  bd:'rgba(47,111,145,.30)' },
  GW:       { a:'#C04A8B', bg:'rgba(192,74,139,.10)',  bd:'rgba(192,74,139,.30)' }
};
var TC_DI = TC;

var MFG = ['#F59E0B', '#94a3b8', '#CD7F32'];
var MBG = ['rgba(245,158,11,.20)', 'rgba(148,163,184,.14)', 'rgba(205,127,50,.17)'];
var MBD = ['rgba(245,158,11,.60)', 'rgba(148,163,184,.40)', 'rgba(205,127,50,.50)'];

function sc(v){ return v>0?'#10b981':v<0?'#ef4444':'#e2e8f6'; }
function sg(v){ return v>0?'+':''; }
function p2(n){ return String(n).padStart(2,'0'); }
function rnd1(v){ return Math.round(v*10)/10; }

function get(path, cb){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + path);
  if(token) xhr.setRequestHeader('Authorization','Bearer '+token);
  xhr.timeout = 30000;
  xhr.onload  = function(){ try{ cb(null,JSON.parse(xhr.responseText)); }catch(e){ cb(e); } };
  xhr.onerror = xhr.ontimeout = function(){ cb(new Error('net')); };
  xhr.send();
}

function login(cb){
  get('/tv-login?key='+TV_KEY, function(err,res){
    if(err||(res&&res.error)){ cb(err||new Error(res.error)); return; }
    token = res.token; cb(null);
  });
}

function loadData(){
  if(!token){ login(function(e){ if(!e) loadData(); }); return; }
  get('/painel/semanal', function(err,res){
    if(err||(res&&res.error)){ token=null; loadData(); return; }
    data = res;
    if(curTab==='metas' || curTab==='desempenho') render();
    document.getElementById('hd-info').textContent =
      'Semana '+res.semana_inicio+' a '+res.semana_fim+(res.updated_at?' · '+res.updated_at:'');
  });
}

function loadDiario(){
  if(!token) return;
  get('/painel/diario', function(err,res){
    if(err||(res&&res.error)) return;
    dataDiario = res;
    if(curTab==='diario') renderDiario();
  });
}

function loadAll(){
  loadData();
  loadDiario();
}

function render(){
  if(!data) return;
  var t = data.totais||{};
  animCount('v-entr', t.entrados||0);
  animCount('v-fech', t.fechados||0);
  var se = document.getElementById('v-saldo');
  se.textContent = sg(t.saldo||0)+(t.saldo||0);
  se.style.color = sc(t.saldo||0);

  var al  = data.analistas||[];
  var rk  = document.getElementById('ranking');
  rk.innerHTML = '';
  var top5 = al.slice(0, 5);
  for(var i=0;i<top5.length;i++){
    var a  = top5[i];
    var c  = TC[a.equipe]||TC.G1;
    var bc = sc(a.saldo);
    var bp = a.entrados>0 ? Math.min(a.fechados/a.entrados*100,100) : (a.fechados>0?100:0);
    var rkNode = i<3
      ? '<div class="rk-circle" style="background:'+MBG[i]+';border:2px solid '+MBD[i]+';color:'+MFG[i]+'">'+(i+1)+'</div>'
      : '<div class="rk-plain">#'+(i+1)+'</div>';
    var row = document.createElement('div');
    row.className = 'a-row'+(i===0?' is-leader':'');
    row.innerHTML =
      '<div class="a-row-body">'+
        rkNode+
        '<div class="a-name-col">'+
          '<div class="aname">'+a.display+'</div>'+
          '<span class="ttag" style="background:'+c.bg+';color:'+c.a+';border:1px solid '+c.bd+'">'+
            (a.equipe==='Producao'?'Producao':a.equipe)+'</span>'+
        '</div>'+
        '<div class="a-stats">'+
          '<div class="st"><div class="sl">Entr.</div><div class="sv" style="color:#94a3b8">'+a.entrados+'</div></div>'+
          '<div class="st"><div class="sl">Fech.</div><div class="sv" style="color:#e2e8f6">'+a.fechados+'</div></div>'+
          '<div class="st"><div class="sl">Saldo</div><div class="sv" style="color:'+bc+'">'+sg(a.saldo)+a.saldo+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="bar-wrap"><div class="bar-inner" style="width:'+bp+'%;background-color:'+bc+'"><div class="bar-shim"></div></div></div>';
    rk.appendChild(row);
  }

  var eq   = data.equipes||[];
  var grid = document.getElementById('eq-grid');
  grid.innerHTML = '';
  var topS = -99999;
  for(var i=0;i<eq.length;i++) if(eq[i].saldo>topS) topS=eq[i].saldo;
  for(var i=0;i<eq.length;i++){
    var e  = eq[i];
    var c  = TC[e.chave]||TC.G1;
    var bc = sc(e.saldo);
    var bp = e.entrados>0 ? Math.min(e.fechados/e.entrados*100,100) : 0;
    var isLdr = (e.saldo===topS && e.saldo>0);
    var bCls  = e.saldo>0?'b-sup':e.saldo<0?'b-def':'b-neu';
    var bTxt  = e.saldo>0?'Superavit':e.saldo<0?'Deficit':'Neutro';
    var card = document.createElement('div');
    card.className = 'eq-card'+(isLdr?' is-leader':'');
    card.style.borderLeftColor = c.a;
    if(isLdr) card.style.boxShadow = '0 0 32px '+c.a+'1a, inset 0 0 40px '+c.a+'08';
    card.innerHTML =
      (isLdr?'<div class="eq-top-line" style="background:linear-gradient(90deg,'+c.a+',transparent)"></div>':'')+
      '<div class="eq-hdr">'+
        '<div><div class="eq-name" style="color:'+c.a+'">'+e.nome+'</div>'+
             '<div class="eq-sub">'+e.analistas+' analistas</div></div>'+
        '<span class="badge '+bCls+'">'+bTxt+'</span>'+
      '</div>'+
      '<div class="eq-metrics">'+
        '<div class="eq-metric"><div class="mv" style="color:#94a3b8">'+e.entrados+'</div><div class="ml">Entrados</div></div>'+
        '<div class="eq-metric"><div class="mv" style="color:#e2e8f6">'+e.fechados+'</div><div class="ml">Fechados</div></div>'+
        '<div class="eq-metric"><div class="mv" style="color:'+bc+'">'+sg(e.saldo)+e.saldo+'</div><div class="ml">Saldo</div></div>'+
      '</div>'+
      '<div class="eq-foot">'+
        '<div class="eq-bar-track"><div class="eq-bar-inner" style="width:'+bp+'%;background-color:'+bc+'"><div class="eq-bar-shim"></div></div></div>'+
        '<span class="eq-taxa-lbl">Taxa</span>'+
        '<span class="eq-taxa-val" style="color:'+c.a+'">'+e.taxa_resolucao+'%</span>'+
      '</div>';
    grid.appendChild(card);
  }
}

function renderDiario(){
  if(!dataDiario) return;

  var al  = dataDiario.analistas || [];
  var tot = dataDiario.totais    || {};

  /* strip de totais */
  var totalHoje = tot.fechados_hoje || 0;
  var metaTotal = tot.meta_total    || 0;
  var saldoDia  = totalHoje - Math.round(metaTotal);
  document.getElementById('di-total').textContent = totalHoje;
  document.getElementById('di-meta').textContent  = rnd1(metaTotal);
  var sEl = document.getElementById('di-saldo');
  sEl.textContent = (saldoDia >= 0 ? '+' : '') + saldoDia;
  sEl.style.color = saldoDia > 0 ? '#10b981' : saldoDia < 0 ? '#ef4444' : '#e2e8f6';

  /* escala global das barras: meta máxima * 2 ou fechado máximo + margem */
  var maxMeta = 0, maxFech = 0;
  for(var i=0; i<al.length; i++){
    if(al[i].meta_dia    > maxMeta) maxMeta = al[i].meta_dia;
    if(al[i].fechados_hoje > maxFech) maxFech = al[i].fechados_hoje;
  }
  var barMax = Math.max(maxMeta > 0 ? maxMeta * 2 : 10, maxFech * 1.1 + 1);

  var list = document.getElementById('diario-list');
  list.innerHTML = '';

  for(var i=0; i<al.length; i++){
    var a    = al[i];
    var c    = TC_DI[a.equipe] || TC_DI.G1;
    var meta = a.meta_dia      || 0;
    var fech = a.fechados_hoje || 0;

    /* barra */
    var fillPct    = barMax > 0 ? Math.min(fech / barMax * 100, 100) : 0;
    var markerPct  = (meta > 0 && barMax > 0) ? Math.min(meta / barMax * 100, 99) : 0;

    var fillBg;
    if(fech > meta && meta > 0){
      var split = (meta / fech * 100).toFixed(1);
      fillBg = 'linear-gradient(90deg,'+c.a+' 0%,'+c.a+' '+split+'%,#10b981 '+split+'%)';
    } else {
      fillBg = c.a;
    }

    var numColor = (fech >= meta && meta > 0) ? '#10b981' : '#e2e8f6';
    var metaFmt  = meta > 0 ? '/'+rnd1(meta) : '';

    var markerHtml = meta > 0
      ? '<div class="di-marker" style="left:'+markerPct.toFixed(1)+'%"></div>'
      : '';

    var row = document.createElement('div');
    row.className = 'di-row';
    row.innerHTML =
      '<div class="di-rk">#'+(i+1)+'</div>'+
      '<div class="di-name-col">'+
        '<div class="di-name">'+a.display+'</div>'+
      '</div>'+
      '<div class="di-bar-col">'+
        '<div class="di-track">'+
          '<div class="di-fill" style="width:'+fillPct.toFixed(1)+'%;background:'+fillBg+'">'+
            '<div class="di-fill-shim"></div>'+
          '</div>'+
          markerHtml+
        '</div>'+
      '</div>'+
      '<div class="di-num-col">'+
        '<span class="di-num-big" style="color:'+numColor+'">'+fech+'</span>'+
        '<span class="di-num-meta">'+metaFmt+'</span>'+
      '</div>';

    list.appendChild(row);
  }
}

function animCount(id, target){
  var el = document.getElementById(id);
  if(!el) return;
  var from = parseInt(el.textContent)||0;
  if(from===target) return;
  var steps=20, step=(target-from)/steps, cnt=0;
  var iv = setInterval(function(){
    cnt++; from+=step;
    el.textContent = Math.round(from);
    if(cnt>=steps){ el.textContent=target; clearInterval(iv); }
  }, 40);
}

function tick(){
  var now = new Date();
  document.getElementById('clock').textContent  = p2(now.getHours())+':'+p2(now.getMinutes())+':'+p2(now.getSeconds());
  document.getElementById('datstr').textContent = now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  var dow=now.getDay(), toSat=((6-dow)+7)%7||7;
  var sat=new Date(now); sat.setDate(now.getDate()+toSat); sat.setHours(0,0,0,0);
  var diff=sat-now, urgent=diff<=3600000;
  var d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000),
      m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  document.getElementById('cd-val').textContent = (d>0?d+'d ':'')+p2(h)+':'+p2(m)+':'+p2(s);
  document.getElementById('cd-val').style.color = urgent?'#f59e0b':'#6b7a94';
  document.getElementById('cd-warn').style.display = urgent?'inline':'none';
  var cd=document.getElementById('cd');
  cd.style.background  = urgent?'rgba(245,158,11,.07)':'rgba(255,255,255,.02)';
  cd.style.borderColor = urgent?'rgba(245,158,11,.28)':'rgba(255,255,255,.05)';
}

function goTab(tab){
  curTab = tab;
  document.getElementById('panel-metas').className      = 'panel'+(tab==='metas'      ?' on':'');
  document.getElementById('panel-diario').className     = 'panel'+(tab==='diario'     ?' on':'');
  document.getElementById('panel-desempenho').className = 'panel'+(tab==='desempenho' ?' on':'');
  document.getElementById('btn-metas').className        = 'tab-btn'+(tab==='metas'      ?' on':'');
  document.getElementById('btn-diario').className       = 'tab-btn'+(tab==='diario'     ?' on':'');
  document.getElementById('btn-desempenho').className   = 'tab-btn'+(tab==='desempenho' ?' on':'');
  if(tab==='diario'   ) renderDiario();
  if(tab==='metas' || tab==='desempenho') render();
  startRot();
}

function nextTab(){
  var idx  = TABS.indexOf(curTab);
  var next = TABS[(idx+1) % TABS.length];
  goTab(next);
}

function startRot(){
  if(rotTmr) clearInterval(rotTmr);
  if(paused) return;
  var start=Date.now(), switched=false;
  rotTmr = setInterval(function(){
    var el=(Date.now()-start)/1000, left=Math.max(0,ROT-el);
    document.getElementById('prog-fill').style.width = ((ROT-left)/ROT*100)+'%';
    document.getElementById('timer-lbl').textContent = Math.ceil(left)+'s';
    if(el>=ROT && !switched){ switched=true; nextTab(); }
  }, 250);
}

function togglePause(){
  paused=!paused;
  var btn=document.getElementById('pause-btn');
  btn.textContent = paused?'Retomar':'Pausar';
  btn.className   = paused?'ctrl-btn on':'ctrl-btn';
  paused ? clearInterval(rotTmr) : startRot();
}

setInterval(tick, 1000);
tick();
setInterval(loadAll, 12*1000);
startRot();
loadData();
loadDiario();
</script>
